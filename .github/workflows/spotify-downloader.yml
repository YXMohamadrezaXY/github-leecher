name: Spotify Music Downloader

on:
  workflow_dispatch:
    inputs:
      spotify_url:
        description: 'لینک Spotify (آهنگ، آلبوم یا پلی‌لیست)'
        required: true
        type: string
      format:
        description: 'فرمت خروجی'
        required: true
        type: choice
        options:
          - mp3
          - flac
        default: 'mp3'
      quality:
        description: 'کیفیت صدا (برای mp3)'
        required: false
        type: choice
        options:
          - '320k'
          - '256k'
          - '192k'
          - '128k'
        default: '320k'

jobs:
  spotify-download:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies (ffmpeg)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python packages
        run: |
          pip install --upgrade yt-dlp
          pip install spotdl

      - name: Download from Spotify
        env:
          SPOTIFY_URL: ${{ github.event.inputs.spotify_url }}
          FORMAT: ${{ github.event.inputs.format }}
          QUALITY: ${{ github.event.inputs.quality }}
        run: python scripts/spotify_downloader.py

      - name: Commit downloaded music
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/spotify/
          git commit -m "🎵 Add Spotify downloads" || echo "No changes to commit"
          git push
