name: Media Downloader (Images & Videos)

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'آدرس صفحه (با http شروع شود)'
        required: true
      max_videos:
        description: 'حداکثر تعداد فیلم برای دانلود'
        required: false
        default: '5'

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests playwright
          playwright install --with-deps chromium

      - name: Run media downloader
        env:
          INPUT_URL: ${{ github.event.inputs.url }}
          INPUT_MAX_VIDEOS: ${{ github.event.inputs.max_videos }}
        run: python scripts/media_downloader.py

      - name: Commit downloaded media
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/media/
          git commit -m "دانلود رسانه‌های جدید" || echo "No changes to commit"
          git push
