name: Manual Bot (Search or Screenshot)

on:
  workflow_dispatch:
    inputs:
      query:
        description: 'عبارت جستجو یا لینک صفحه (با http شروع شود)'
        required: true
        default: 'python'
      full_page:
        description: 'اسکرین‌شات طولانی (کل صفحه) یا فقط نمای قابل مشاهده؟'
        required: true
        type: choice
        options:
          - 'بله (کل صفحه)'
          - 'نه (فقط نمای قابل مشاهده)'
        default: 'بله (کل صفحه)'

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests playwright
          playwright install --with-deps chromium

      - name: Run handler
        env:
          INPUT_QUERY: ${{ github.event.inputs.query }}
          INPUT_FULL_PAGE: ${{ github.event.inputs.full_page }}
        run: python scripts/manual_handler.py

      - name: Commit and push results
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/
          git commit -m "افزودن خروجی جدید" || echo "No changes to commit"
          git push
