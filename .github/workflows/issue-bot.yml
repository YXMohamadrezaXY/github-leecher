name: Issue Bot (Search & Screenshot)

on:
  issues:
    types: [opened]

jobs:
  handle-issue:
    runs-on: ubuntu-latest
    if: github.event.issue.user.type != 'Bot'
    permissions:
      issues: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests playwright
          playwright install --with-deps chromium

      - name: Run handler
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
        run: python scripts/issue_handler.py

      # قدم جدید برای ارسال کامنت متنی
      - name: Post text reply
        if: hashFiles('output/reply.txt') != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: gh issue comment $ISSUE_NUMBER --body "$(cat output/reply.txt)"

      # قدم آپلود اسکرین‌شات (در صورت وجود)
      - name: Upload screenshot
        if: hashFiles('output/screenshot.png') != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          gh issue comment $ISSUE_NUMBER --body "📸 اسکرین‌شات پیوست شد."
          gh issue upload $ISSUE_NUMBER output/screenshot.png
